<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Pharmacie — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <div class="croix" aria-hidden="true">
            <span></span><span></span>
        </div>
        <div>
            <h1>Gestion Pharmacie</h1>
            <p class="soustitre">Connexion · Espace pharmacien &amp; gestionnaire</p>
        </div>
    </header>


    <main class="grille">

        <section class="carte connexion">
            <h2>Connexion</h2>

            <form id="formLogin">
                <label>
                    Login
                    <input type="text" name="login" required autocomplete="username">
                </label>

                <label>
                    Mot de passe
                    <input type="password" name="pwd" required autocomplete="current-password">
                </label>

                <button type="submit">Se connecter</button>
            </form>

            <p class="alerte" id="erreurLogin" hidden></p>
        </section>

    </main>


    <script src="login.js"></script>
</body>
</html>
